#Use below for railway deployment
spring.application.name=MEMBER-SERVICE
server.port=${PORT:8081}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}


spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_gym_member}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:rootMukti@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.kafka.producer.bootstrap-servers=${KAFKA_SERVER:localhost:9092}
